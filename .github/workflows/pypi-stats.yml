name: PyPI Stats Daily

# Daily 09:30 UTC pulse on agentlens-monitor PyPI downloads.
# Emails Soufian only on >=30% WoW drop or >=100% WoW spike. Otherwise silent.
# Commits the rolling history file so the next run can compute deltas.

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

permissions:
  contents: write   # to commit pypi_stats_history.json

concurrency:
  group: pypi-stats
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install sendgrid

      - name: Run PyPI stats agent
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          OPS_EMAIL: ${{ secrets.OPS_EMAIL }}
        run: python agents/pypi_stats.py

      - name: Commit history (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agents/pypi_stats_history.json || true
          if git diff --cached --quiet; then
            echo "No history change to commit"
          else
            git commit -m "chore: pypi stats daily snapshot [skip ci]"
            git push
          fi
