<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Debugger â€” AgentLens</title>
  <script src="/auth.js?v=20260507d"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07111f;
      --panel: #10233a;
      --line: #244262;
      --text: #d8e6f6;
      --muted: #8ca3bd;
      --accent: #6fc3ff;
      --accent-soft: #818cf8;
      --good: #38d39f;
      --warn: #f0a73b;
      --bad: #ff6f7d;
    }
    body {
      font-family: "Segoe UI Variable", "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -20%, #1e3f62 0%, transparent 60%),
        radial-gradient(900px 500px at 110% 0%, #123658 0%, transparent 50%),
        linear-gradient(180deg, #07111f 0%, #081426 100%);
      min-height: 100vh;
      padding: 26px;
    }
    a { color: var(--accent-soft); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 1500px; margin: 0 auto; }
    .top-nav { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 0.8rem; }
    .nav-left { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-link {
      color: var(--text); text-decoration: none; font-size: 13px; padding: 10px 14px;
      border: 1px solid var(--line); border-radius: 10px; background: rgba(12, 27, 47, 0.6);
    }
    .btn-link:hover { text-decoration: none; border-color: #3d69a0; }
    button.btn-link { cursor: pointer; font-family: inherit; }
    .btn-link.active { border-color: #3d69a0; background: rgba(27, 49, 76, 0.75); }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.5rem; }
    .scope-pill {
      display:inline-block; margin-top:-1rem; margin-bottom:1.2rem; padding:0.25rem 0.6rem;
      border-radius:999px; border:1px solid #2c4f70; color:#9bd2ff; font-size:0.75rem;
      background: rgba(10,26,45,0.72);
    }
    .filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: end; }
    .filter-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .filter-group label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-group input, .filter-group select {
      background: #1a2740; border: 1px solid var(--line); color: var(--text);
      padding: 0.45rem 0.65rem; border-radius: 8px; font-size: 0.9rem;
    }
    .filter-group input { width: 160px; }
    .filter-group select { width: 160px; }
    .btn { background: var(--accent-soft); color: #0f1117; border: none; padding: 0.45rem 1rem; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .btn:hover { background: #97a4ff; }
    .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); }
    .results-count { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
    .request-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .request-card {
      background: #1a2740; border: 1px solid var(--line); border-radius: 10px;
      padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.2s;
    }
    .request-card:hover { border-color: #3d69a0; }
    .request-card.expanded { border-color: #3d69a0; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .card-meta { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--muted); }
    .score { font-weight: 700; }
    .score.bad { color: var(--bad); }
    .score.mid { color: var(--warn); }
    .score.good { color: var(--good); }
    .flag { display: inline-block; font-size: 0.65rem; background: #2d1b1b; color: var(--bad);
            border: 1px solid #7f1d1d; border-radius: 4px; padding: 0 0.35rem; margin: 1px; }
    .preview-text { color: #a6bbd3; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .detail { display: none; margin-top: 1rem; border-top: 1px solid var(--line); padding-top: 1rem; }
    .detail.open { display: block; }
    .detail-section { margin-bottom: 1rem; }
    .detail-label { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .detail-content {
      background: #0f1e32; border: 1px solid #203a59; border-radius: 8px;
      padding: 0.75rem; font-size: 0.8rem; color: #cbd5e1; white-space: pre-wrap;
      word-break: break-word; max-height: 200px; overflow-y: auto;
    }
    .eval-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
    .eval-item { background: #0f1e32; border: 1px solid #203a59; border-radius: 8px; padding: 0.75rem; text-align: center; }
    .eval-item .val { font-size: 1.25rem; font-weight: 700; }
    .eval-item .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }
    .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; font-size: 0.8rem; }
    .meta-grid div { background: #0f1e32; border: 1px solid #203a59; padding: 0.5rem; border-radius: 6px; }
    .meta-grid .key { color: var(--muted); }
    .meta-grid .val { color: var(--text); }
    @media (max-width: 700px) { .eval-grid { grid-template-columns: 1fr 1fr; } .meta-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
  <div class="top-nav">
    <div class="nav-left">
      <a class="btn-link" href="/dashboard">Dashboard</a>
    </div>
    <nav class="actions">
      <button class="btn-link" type="button" onclick="agentlensLogout()">Logout</button>
      <a class="btn-link" id="navAgentDebugger" href="/traces.html">Agent Debugger</a>
      <a class="btn-link active" id="navPromptDebugger" href="/debug.html">Prompt Debugger</a>
      <a class="btn-link" id="navCompliance" href="/compliance.html">Compliance</a>
    </nav>
  </div>
  <h1>Prompt Debugger</h1>
  <p class="subtitle">Search and inspect individual LLM calls - find exactly where and why things fail</p>
  <div class="scope-pill">Data Scope: API-key isolated project context</div>

  <div class="filters">
    <div class="filter-group">
      <label>Model</label>
      <select id="filterModel"><option value="">All models</option></select>
    </div>
    <div class="filter-group">
      <label>Max Quality</label>
      <input type="number" id="filterMaxQuality" min="0" max="1" step="0.1" placeholder="e.g. 0.5" />
    </div>
    <div class="filter-group">
      <label>Flag</label>
      <select id="filterFlag"><option value="">All flags</option></select>
    </div>
    <div class="filter-group">
      <label>Prompt contains</label>
      <input type="text" id="filterPrompt" placeholder="search in prompt..." />
    </div>
    <div class="filter-group">
      <label>Input contains</label>
      <input type="text" id="filterInput" placeholder="search in input..." />
    </div>
    <div class="filter-group">
      <label>Output contains</label>
      <input type="text" id="filterOutput" placeholder="search in output..." />
    </div>
    <div class="filter-group">
      <label>&nbsp;</label>
      <button class="btn" id="searchBtn">Search</button>
    </div>
    <div class="filter-group">
      <label>&nbsp;</label>
      <button class="btn btn-ghost" id="clearBtn">Clear</button>
    </div>
  </div>

  <div class="results-count" id="resultsCount"></div>
  <div class="request-list" id="requestList"></div>
  </main>

  <script>
    const API = "";
    const PLAN_ORDER = ["free", "starter", "team", "scale", "enterprise"];

    function lockNavLink(linkId, minPlanLabel) {
      const link = document.getElementById(linkId);
      if (!link) return;
      link.href = "/#pricing";
      link.textContent = `${link.textContent} (from ${minPlanLabel})`;
      link.style.opacity = "0.65";
    }

    async function getContext() {
      try {
        const res = await fetch(`${API}/dashboard/context`);
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    function renderUpgradeGate(requiredPlan, featureLabel) {
      const main = document.querySelector("main.wrap");
      if (!main) return;
      main.innerHTML = `
        <div style="max-width:780px;margin:6rem auto 0;border:1px solid #244262;border-radius:14px;background:#10233a;padding:1.4rem;">
          <h1 style="font-size:1.5rem;margin-bottom:0.6rem;">${featureLabel} is locked on your current plan</h1>
          <p style="color:#9fb6cf;margin-bottom:1rem;">Upgrade to <strong>${requiredPlan}</strong> to access this feature.</p>
          <div style="display:flex;gap:0.6rem;flex-wrap:wrap;">
            <a class="btn-link" href="/dashboard">Back to Dashboard</a>
            <a class="btn-link active" href="/#pricing">View Plans</a>
          </div>
        </div>
      `;
    }

    function planAtLeast(current, required) {
      return PLAN_ORDER.indexOf(current) >= PLAN_ORDER.indexOf(required);
    }

    function scoreClass(s) {
      if (s === null || s === undefined) return "";
      if (s < 0.4) return "bad";
      if (s < 0.7) return "mid";
      return "good";
    }

    function fmtTime(ts) {
      return new Date(ts * 1000).toLocaleString();
    }

    // Load filter options
    async function loadFilters() {
      try {
        const [models, flags] = await Promise.all([
          fetch(`${API}/debug/models`).then(r => r.json()),
          fetch(`${API}/debug/flags`).then(r => r.json()),
        ]);
        const ms = document.getElementById("filterModel");
        for (const m of models) {
          ms.innerHTML += `<option value="${m}">${m}</option>`;
        }
        const fs = document.getElementById("filterFlag");
        for (const f of flags) {
          fs.innerHTML += `<option value="${f}">${f}</option>`;
        }
      } catch(e) { console.warn("filter load failed", e); }
    }

    async function search() {
      const params = new URLSearchParams();
      const model = document.getElementById("filterModel").value;
      const maxQ = document.getElementById("filterMaxQuality").value;
      const flag = document.getElementById("filterFlag").value;
      const prompt = document.getElementById("filterPrompt").value;
      const input = document.getElementById("filterInput").value;
      const output = document.getElementById("filterOutput").value;

      if (model) params.set("model", model);
      if (maxQ) params.set("max_quality", maxQ);
      if (flag) params.set("flag", flag);
      if (prompt) params.set("prompt_contains", prompt);
      if (input) params.set("input_contains", input);
      if (output) params.set("output_contains", output);

      const res = await fetch(`${API}/debug/requests?${params}`);
      const data = await res.json();

      document.getElementById("resultsCount").textContent = `${data.count} results`;
      const list = document.getElementById("requestList");
      list.innerHTML = "";

      for (const r of data.results) {
        const flags = (r.flags || []).map(f => `<span class="flag">${f}</span>`).join(" ");
        const qClass = scoreClass(r.quality_score);
        const qText = r.quality_score !== null ? r.quality_score.toFixed(2) : "â€”";

        const card = document.createElement("div");
        card.className = "request-card";
        card.innerHTML = `
          <div class="card-header">
            <div>
              <span class="score ${qClass}">${qText}</span> ${flags}
            </div>
            <div class="card-meta">
              <span>${r.model}</span>
              <span>${fmtTime(r.timestamp)}</span>
              ${r.cost_usd ? `<span>$${r.cost_usd.toFixed(4)}</span>` : ""}
              ${r.user_id ? `<span>user: ${r.user_id}</span>` : ""}
            </div>
          </div>
          <div class="preview-text" title="${r.input_preview}"><strong>Input:</strong> ${r.input_preview}</div>
          <div class="preview-text" title="${r.output_preview}"><strong>Output:</strong> ${r.output_preview}</div>
          <div class="detail" id="detail-${r.request_id}"></div>
        `;
        card.addEventListener("click", () => toggleDetail(r.request_id));
        list.appendChild(card);
      }
    }

    async function toggleDetail(id) {
      const el = document.getElementById(`detail-${id}`);
      if (el.classList.contains("open")) {
        el.classList.remove("open");
        return;
      }

      if (!el.dataset.loaded) {
        const res = await fetch(`${API}/debug/requests/${id}`);
        const d = await res.json();
        const ev = d.evaluation;

        el.innerHTML = `
          ${ev ? `
          <div class="eval-grid">
            <div class="eval-item">
              <div class="val score ${scoreClass(ev.quality_score)}">${ev.quality_score.toFixed(2)}</div>
              <div class="lbl">Quality</div>
            </div>
            <div class="eval-item">
              <div class="val score ${scoreClass(1 - ev.hallucination_score)}">${ev.hallucination_score.toFixed(2)}</div>
              <div class="lbl">Hallucination</div>
            </div>
            <div class="eval-item">
              <div class="val">${(ev.flags || []).length}</div>
              <div class="lbl">Flags</div>
            </div>
            <div class="eval-item">
              <div class="val">${d.cost_usd ? '$' + d.cost_usd.toFixed(4) : 'â€”'}</div>
              <div class="lbl">Cost</div>
            </div>
          </div>
          ${ev.explanation ? `
          <div class="detail-section">
            <div class="detail-label">Evaluation Explanation</div>
            <div class="detail-content">${ev.explanation}</div>
          </div>` : ""}
          ` : "<p style='color:#64748b;'>No evaluation yet</p>"}
          <div class="detail-section">
            <div class="detail-label">System Prompt</div>
            <div class="detail-content">${d.prompt}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">User Input</div>
            <div class="detail-content">${d.input}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Model Output</div>
            <div class="detail-content">${d.output}</div>
          </div>
          ${d.input_tokens ? `
          <div class="meta-grid">
            <div><span class="key">Model:</span> <span class="val">${d.model}</span></div>
            <div><span class="key">Input tokens:</span> <span class="val">${d.input_tokens}</span></div>
            <div><span class="key">Output tokens:</span> <span class="val">${d.output_tokens}</span></div>
          </div>` : ""}
        `;
        el.dataset.loaded = "true";
      }
      el.classList.add("open");
    }

    document.getElementById("searchBtn").addEventListener("click", search);
    document.getElementById("clearBtn").addEventListener("click", () => {
      document.getElementById("filterModel").value = "";
      document.getElementById("filterMaxQuality").value = "";
      document.getElementById("filterFlag").value = "";
      document.getElementById("filterPrompt").value = "";
      document.getElementById("filterInput").value = "";
      document.getElementById("filterOutput").value = "";
      search();
    });

    async function initPage() {
      const context = await getContext();
      const plan = String((context && context.plan) || "free").toLowerCase();
      const features = (context && context.features) || {};

      if (!features.agent_debugger) lockNavLink("navAgentDebugger", "Team");
      if (!features.compliance_gdpr) lockNavLink("navCompliance", "Scale");

      if (!planAtLeast(plan, "starter") || !features.prompt_debugger) {
        renderUpgradeGate("Starter", "Prompt Debugger");
        return;
      }

      await loadFilters();
      await search();
    }

    initPage();
  </script>
</body>
</html>
