<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Debugger - AgentLens</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <script src="/auth.js?v=20260507d"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1d;
      --surface: #11182f;
      --surface-soft: #131e38;
      --ink: #e7ecff;
      --ink-soft: #9aa8c6;
      --line: #263556;
      --accent: #7c9bff;
      --accent-strong: #a8beff;
      --ok: #4ade80;
      --bad: #f87171;
      --info: #60a5fa;
      --shadow: 0 22px 54px rgba(0, 0, 0, 0.35);
    }
    body {
      font-family: "Segoe UI Variable", "Segoe UI", "Trebuchet MS", "Lucida Sans", "Tahoma", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 520px at 90% -20%, #1a2650 0%, rgba(26, 38, 80, 0) 62%),
        radial-gradient(900px 420px at -10% -10%, #152347 0%, rgba(21, 35, 71, 0) 58%),
        var(--bg);
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: var(--accent-strong); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { width: min(1220px, calc(100% - 2.4rem)); margin: 0 auto; }
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 1.2rem 0 0.4rem;
    }
    .nav-left { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-link {
      color: var(--ink);
      text-decoration: none;
      font-size: 13px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(12, 27, 47, 0.6);
    }
    .btn-link:hover { text-decoration: none; border-color: #3d69a0; }
    button.btn-link { cursor: pointer; font-family: inherit; }
    .btn-link.active {
      border-color: #3d69a0;
      background: rgba(27, 49, 76, 0.75);
    }
    .hero {
      border: 1px solid var(--line);
      background: linear-gradient(160deg, rgba(19, 30, 56, 0.96), rgba(12, 18, 36, 0.96));
      box-shadow: var(--shadow);
      border-radius: 16px;
      margin: 0.85rem 0 1rem;
      padding: 1.15rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.2rem; letter-spacing: -0.01em; }
    .subtitle { color: var(--ink-soft); font-size: 0.96rem; margin-bottom: 0.95rem; }
    .scope-pill {
      display: inline-block;
      padding: 0.25rem 0.72rem;
      border-radius: 999px;
      border: 1px solid #36558c;
      color: #c8d7fa;
      background: rgba(18, 31, 60, 0.75);
      font-size: 0.78rem;
      font-weight: 700;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(17, 24, 47, 0.82);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .filters { display: flex; gap: 0.75rem; margin-bottom: 0.5rem; align-items: end; flex-wrap: wrap; }
    .filter-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .filter-group label { font-size: 0.7rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em; }
    .filter-group input, .filter-group select {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 0.48rem 0.66rem;
      border-radius: 8px;
      font-size: 0.9rem;
      width: 170px;
    }
    .btn {
      background: var(--accent);
      color: #0f1117;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { background: #93adff; }
    .btn.secondary { background: transparent; border: 1px solid var(--line); color: var(--ink-soft); }

    .trace-card {
      background: rgba(19, 30, 56, 0.9);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.6rem;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .trace-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .trace-header { display: flex; justify-content: space-between; align-items: center; gap: 0.6rem; }
    .trace-name { font-weight: 700; font-size: 1rem; }
    .trace-meta { display: flex; gap: 0.9rem; font-size: 0.78rem; color: var(--ink-soft); flex-wrap: wrap; justify-content: flex-end; }
    .status { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
    .status.completed { background: #1a2e1a; color: var(--ok); }
    .status.failed { background: #3b1111; color: var(--bad); }
    .status.running { background: #1e3a5f; color: var(--info); }
    .trace-preview { color: #b3c4e7; font-size: 0.84rem; margin-top: 0.4rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #detailView { display: none; }
    .detail-header { margin-bottom: 1.5rem; }
    .detail-kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .detail-kpi { background: rgba(19, 30, 56, 0.9); border: 1px solid var(--line); border-radius: 10px; padding: 0.75rem; text-align: center; }
    .detail-kpi .val { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    .detail-kpi .lbl { font-size: 0.7rem; color: var(--ink-soft); margin-top: 0.2rem; }
    .io-section { margin-bottom: 1rem; }
    .io-label { font-size: 0.7rem; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 0.3rem; letter-spacing: 0.08em; }
    .io-content { background: rgba(19, 30, 56, 0.9); border: 1px solid var(--line); border-radius: 8px; padding: 0.75rem; font-size: 0.8rem; color: #cbd5e1; white-space: pre-wrap; word-break: break-word; max-height: 150px; overflow-y: auto; }

    .waterfall { margin-top: 1.5rem; }
    .waterfall h2 { font-size: 0.875rem; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 1rem; letter-spacing: 0.08em; }
    .span-row { display: flex; align-items: stretch; margin-bottom: 2px; min-height: 36px; }
    .span-label { width: 220px; flex-shrink: 0; display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; padding-right: 0.5rem; }
    .span-type-badge { font-size: 0.6rem; padding: 0.1rem 0.3rem; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
    .span-type-badge.llm { background: #312e81; color: #a5b4fc; }
    .span-type-badge.tool { background: #1a2e1a; color: #4ade80; }
    .span-type-badge.retrieval { background: #2d2418; color: #fb923c; }
    .span-type-badge.decision { background: #3b1111; color: #fca5a5; }
    .span-type-badge.custom { background: #1e293b; color: #94a3b8; }
    .span-track { flex: 1; position: relative; background: rgba(10, 15, 29, 0.85); border-radius: 6px; overflow: hidden; border: 1px solid var(--line); }
    .span-bar { position: absolute; height: 100%; border-radius: 4px; min-width: 2px; cursor: pointer; display: flex; align-items: center; padding-left: 0.4rem; font-size: 0.7rem; color: #fff; }
    .span-bar.completed { background: #818cf8; }
    .span-bar.failed { background: #f87171; }
    .span-bar.running { background: #60a5fa; }
    .span-bar:hover { opacity: 0.85; }

    .span-detail { display: none; background: rgba(19, 30, 56, 0.9); border: 1px solid var(--line); border-radius: 10px; padding: 1rem; margin: 0.5rem 0 0.5rem 220px; font-size: 0.8rem; }
    .span-detail.open { display: block; }
    .span-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .span-detail-item .key { color: var(--ink-soft); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .span-detail-item .val { color: #e2e8f0; margin-top: 0.15rem; }
    .span-io { margin-top: 0.5rem; }
    .span-io-label { font-size: 0.7rem; color: var(--ink-soft); text-transform: uppercase; margin-bottom: 0.2rem; letter-spacing: 0.08em; }
    .span-io-content { background: rgba(10, 15, 29, 0.85); border: 1px solid var(--line); border-radius: 6px; padding: 0.5rem; color: #cbd5e1; white-space: pre-wrap; max-height: 120px; overflow-y: auto; font-size: 0.75rem; }

    @media (max-width: 980px) {
      .detail-kpis { grid-template-columns: repeat(2, 1fr); }
      .span-label { width: 140px; }
      .span-detail { margin-left: 140px; }
    }
    @media (max-width: 760px) {
      .wrap { width: min(1220px, calc(100% - 1.2rem)); }
      h1 { font-size: 1.65rem; }
      .trace-header { flex-direction: column; align-items: flex-start; }
      .trace-meta { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top-nav">
      <div class="nav-left">
        <a class="btn-link" href="/dashboard">Dashboard</a>
      </div>
      <nav class="actions">
        <button class="btn-link" type="button" onclick="agentlensLogout()">Logout</button>
        <a class="btn-link active" href="/traces.html">Agent Debugger</a>
        <a class="btn-link" href="/debug.html">Prompt Debugger</a>
        <a class="btn-link" href="/compliance.html">Compliance</a>
      </nav>
    </div>

    <div class="hero">
      <h1>Agent Debugger</h1>
      <p class="subtitle">Trace multi-step agent runs - see every step, find where things break.</p>
      <div class="scope-pill">Data Scope: API-key isolated project context</div>
    </div>

    <div id="listView">
      <div class="panel">
        <div class="filters">
          <div class="filter-group">
            <label>Agent name</label>
            <input type="text" id="filterName" placeholder="e.g. research_agent" />
          </div>
          <div class="filter-group">
            <label>Status</label>
            <select id="filterStatus">
              <option value="">All</option>
              <option value="completed">Completed</option>
              <option value="failed">Failed</option>
              <option value="running">Running</option>
            </select>
          </div>
          <div class="filter-group">
            <label>From</label>
            <input type="datetime-local" id="filterFrom" />
          </div>
          <div class="filter-group">
            <label>To</label>
            <input type="datetime-local" id="filterTo" />
          </div>
          <div class="filter-group">
            <label>Min duration (ms)</label>
            <input type="number" id="filterMinDuration" placeholder="e.g. 1000" min="0" />
          </div>
          <div class="filter-group">
            <label>Min cost (USD)</label>
            <input type="number" id="filterMinCost" placeholder="e.g. 0.01" min="0" step="0.001" />
          </div>
          <div class="filter-group">
            <label>&nbsp;</label>
            <button class="btn" id="searchBtn">Search</button>
          </div>
          <div class="filter-group">
            <label>&nbsp;</label>
            <button class="btn secondary" id="resetBtn">Reset</button>
          </div>
        </div>
        <div id="traceCount" style="color:var(--ink-soft); font-size:0.84rem; margin-bottom:0.75rem;"></div>
      </div>
      <div id="traceList"></div>
    </div>

    <div id="detailView">
      <button class="btn secondary" id="backBtn" style="margin-bottom:1rem;">Back to list</button>
      <div class="detail-header">
        <div style="display:flex; align-items:center; gap:0.75rem;">
          <span id="detailName" style="font-size:1.25rem; font-weight:700;"></span>
          <span id="detailStatus"></span>
        </div>
        <div id="detailError" style="display:none; background:#2d1b1b; border:1px solid #7f1d1d; border-radius:8px; padding:0.5rem 0.75rem; color:#f87171; font-size:0.85rem; margin-top:0.5rem;"></div>
      </div>

      <div class="detail-kpis">
        <div class="detail-kpi"><div class="val" id="kpiSpans">-</div><div class="lbl">Steps</div></div>
        <div class="detail-kpi"><div class="val" id="kpiDuration">-</div><div class="lbl">Duration</div></div>
        <div class="detail-kpi"><div class="val" id="kpiTokens">-</div><div class="lbl">Total Tokens</div></div>
        <div class="detail-kpi"><div class="val" id="kpiCost">-</div><div class="lbl">Total Cost</div></div>
        <div class="detail-kpi"><div class="val" id="kpiModel">-</div><div class="lbl">Models</div></div>
      </div>

      <div class="panel" style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem;">
        <div class="io-section">
          <div class="io-label">Agent Input</div>
          <div class="io-content" id="detailInput">-</div>
        </div>
        <div class="io-section">
          <div class="io-label">Agent Output</div>
          <div class="io-content" id="detailOutput">-</div>
        </div>
      </div>

      <div class="waterfall">
        <h2>Execution Timeline</h2>
        <div id="waterfallContainer"></div>
      </div>
    </div>
  </main>

  <script>
    const API = "";

    function fmtTime(ts) { return ts ? new Date(ts * 1000).toLocaleString() : "-"; }
    function fmtDuration(ms) {
      if (!ms) return "-";
      if (ms < 1000) return ms.toFixed(0) + "ms";
      return (ms / 1000).toFixed(1) + "s";
    }

    async function loadTraces() {
      const params = new URLSearchParams();
      const name = document.getElementById("filterName").value;
      const status = document.getElementById("filterStatus").value;
      const from = document.getElementById("filterFrom").value;
      const to = document.getElementById("filterTo").value;
      const minDuration = document.getElementById("filterMinDuration").value;
      const minCost = document.getElementById("filterMinCost").value;
      if (name) params.set("name", name);
      if (status) params.set("status", status);
      if (from) params.set("from_ts", new Date(from).getTime() / 1000);
      if (to) params.set("to_ts", new Date(to).getTime() / 1000);
      if (minDuration) params.set("min_duration_ms", minDuration);
      if (minCost) params.set("min_cost_usd", minCost);

      const res = await fetch(`${API}/traces?${params}`);
      const data = await res.json();

      document.getElementById("traceCount").textContent = `${data.count} traces`;
      const list = document.getElementById("traceList");
      list.innerHTML = "";

      for (const t of data.traces) {
        const card = document.createElement("div");
        card.className = "trace-card";
        card.innerHTML = `
          <div class="trace-header">
            <div>
              <span class="trace-name">${t.name}</span>
              <span class="status ${t.status}">${t.status}</span>
            </div>
            <div class="trace-meta">
              <span>${t.span_count} steps</span>
              <span>${fmtDuration(t.total_duration_ms)}</span>
              <span>${t.total_tokens ? t.total_tokens + ' tok' : ''}</span>
              <span>${t.total_cost_usd ? '$' + t.total_cost_usd.toFixed(4) : ''}</span>
              <span>${fmtTime(t.started_at)}</span>
            </div>
          </div>
          ${t.input_preview ? `<div class="trace-preview">${t.input_preview}</div>` : ""}
          ${t.error ? `<div style="color:#f87171; font-size:0.8rem; margin-top:0.3rem;">Error: ${t.error.slice(0, 100)}</div>` : ""}
        `;
        card.addEventListener("click", () => loadTraceDetail(t.trace_id));
        list.appendChild(card);
      }

      if (!data.count) {
        list.innerHTML = '<div style="color:var(--ink-soft); text-align:center; padding:3rem;">No traces yet. Use <code>trace_agent()</code> in your code to start tracing.</div>';
      }
    }

    async function loadTraceDetail(traceId) {
      const res = await fetch(`${API}/traces/${traceId}`);
      const t = await res.json();

      document.getElementById("listView").style.display = "none";
      document.getElementById("detailView").style.display = "block";

      document.getElementById("detailName").textContent = t.name;
      document.getElementById("detailStatus").className = "status " + t.status;
      document.getElementById("detailStatus").textContent = t.status;

      if (t.error) {
        const el = document.getElementById("detailError");
        el.style.display = "block";
        el.textContent = "Error: " + t.error;
      } else {
        document.getElementById("detailError").style.display = "none";
      }

      document.getElementById("kpiSpans").textContent = t.spans.length;
      document.getElementById("kpiDuration").textContent = fmtDuration(t.total_duration_ms);
      document.getElementById("kpiTokens").textContent = t.total_tokens || "-";
      document.getElementById("kpiCost").textContent = t.total_cost_usd ? "$" + t.total_cost_usd.toFixed(4) : "-";

      const models = [...new Set(t.spans.filter(s => s.model).map(s => s.model))];
      document.getElementById("kpiModel").textContent = models.join(", ") || "-";

      document.getElementById("detailInput").textContent = t.input || "-";
      document.getElementById("detailOutput").textContent = t.output || "-";

      renderWaterfall(t.spans, t.started_at, t.ended_at || (t.started_at + (t.total_duration_ms || 1000) / 1000));
    }

    function renderWaterfall(spans, traceStart, traceEnd) {
      const container = document.getElementById("waterfallContainer");
      container.innerHTML = "";

      const totalDuration = (traceEnd - traceStart) || 0.001;

      for (const s of spans) {
        const row = document.createElement("div");
        row.className = "span-row";

        const spanStart = s.started_at - traceStart;
        const spanEnd = (s.ended_at || traceEnd) - traceStart;
        const leftPct = (spanStart / totalDuration) * 100;
        const widthPct = Math.max(((spanEnd - spanStart) / totalDuration) * 100, 1);

        const indent = s.parent_span_id ? "  " : "";

        row.innerHTML = `
          <div class="span-label">
            ${indent}<span class="span-type-badge ${s.span_type}">${s.span_type}</span>
            <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${s.name}</span>
          </div>
          <div class="span-track">
            <div class="span-bar ${s.status}" style="left:${leftPct}%; width:${widthPct}%;"
                 title="${s.name}: ${fmtDuration(s.duration_ms)}">
              ${s.duration_ms ? fmtDuration(s.duration_ms) : ""}
            </div>
          </div>
        `;

        container.appendChild(row);

        const detail = document.createElement("div");
        detail.className = "span-detail";
        detail.innerHTML = `
          <div class="span-detail-grid">
            <div class="span-detail-item"><div class="key">Status</div><div class="val"><span class="status ${s.status}">${s.status}</span></div></div>
            <div class="span-detail-item"><div class="key">Duration</div><div class="val">${fmtDuration(s.duration_ms)}</div></div>
            ${s.model ? `<div class="span-detail-item"><div class="key">Model</div><div class="val">${s.model}</div></div>` : ""}
            ${s.tokens ? `<div class="span-detail-item"><div class="key">Tokens</div><div class="val">${s.tokens}</div></div>` : ""}
            ${s.cost_usd ? `<div class="span-detail-item"><div class="key">Cost</div><div class="val">$${s.cost_usd.toFixed(4)}</div></div>` : ""}
            ${s.error ? `<div class="span-detail-item"><div class="key">Error</div><div class="val" style="color:#f87171;">${s.error}</div></div>` : ""}
          </div>
          ${s.input ? `<div class="span-io"><div class="span-io-label">Input</div><div class="span-io-content">${s.input}</div></div>` : ""}
          ${s.output ? `<div class="span-io"><div class="span-io-label">Output</div><div class="span-io-content">${s.output}</div></div>` : ""}
        `;
        container.appendChild(detail);

        row.addEventListener("click", () => {
          detail.classList.toggle("open");
        });
      }
    }

    document.getElementById("searchBtn").addEventListener("click", loadTraces);
    document.getElementById("resetBtn").addEventListener("click", () => {
      document.getElementById("filterName").value = "";
      document.getElementById("filterStatus").value = "";
      document.getElementById("filterFrom").value = "";
      document.getElementById("filterTo").value = "";
      document.getElementById("filterMinDuration").value = "";
      document.getElementById("filterMinCost").value = "";
      loadTraces();
    });
    document.getElementById("backBtn").addEventListener("click", () => {
      document.getElementById("detailView").style.display = "none";
      document.getElementById("listView").style.display = "block";
    });

    loadTraces();
  </script>
</body>
</html>
