[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-evaltrack"
version = "0.1.0"
description = "Drop-in observability for LLM applications — automatic quality scoring, hallucination detection, and cost tracking."
readme = "README_SDK.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["llm", "observability", "monitoring", "openai", "anthropic", "evaluation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
openai    = ["openai>=1.0"]
anthropic = ["anthropic>=0.40"]
all       = ["openai>=1.0", "anthropic>=0.40"]

[tool.hatch.build.targets.wheel]
packages = ["llm_observe"]
